spring:
  application:
    name: vehicle-sales-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vehicle_sales}
    username: ${DB_USERNAME:vehicle_sales}
    password: ${DB_PASSWORD:vehicle_sales}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/vehicle-sales}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8081/realms/vehicle-sales/protocol/openid-connect/certs}

app:
  security:
    keycloak:
      external-url: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8081/realms/vehicle-sales}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    oauth:
      client-id: vehicle-sales-swagger
      use-pkce-with-authorization-code-grant: true
      scopes: openid
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
server:
  port: ${SERVER_PORT:8080}
